  <text x="870" y="212" font-size="9" fill="#6b7280" text-anchor="middle">层级化评估</text>
  <text x="870" y="228" font-size="9" fill="#6b7280" text-anchor="middle">诊断性反馈</text>
  <text x="870" y="248" font-size="8" fill="#9ca3af" text-anchor="middle">适用: ReportBench, DRB2, DRACO</text>
  <rect x="150" y="340" width="100" height="30" rx="4" fill="#f8fafc"/>
  <text x="200.0" y="358.6666666666667" font-size="11" fill="#1a1a2e" text-anchor="middle">归一化</text>
