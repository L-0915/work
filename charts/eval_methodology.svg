  <text x="690" y="212" font-size="9" fill="#6b7280" text-anchor="middle">位置偏差缓解</text>
  <text x="690" y="228" font-size="9" fill="#6b7280" text-anchor="middle">ELO 锦标赛</text>
  <text x="690" y="248" font-size="8" fill="#9ca3af" text-anchor="middle">适用: DeepConsult</text>
  <rect x="780" y="140" width="180" height="40" rx="4" fill="#6366f1"/>
  <text x="870.0" y="163.66666666666666" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">Rubric 评分</text>
