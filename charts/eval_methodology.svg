  <text x="510" y="196" font-size="9" fill="#6b7280" text-anchor="middle">CORRECT/INCORRECT/</text>
  <text x="510" y="212" font-size="9" fill="#6b7280" text-anchor="middle">NOT_ATTEMPTED</text>
  <text x="510" y="228" font-size="9" fill="#6b7280" text-anchor="middle">区分错误vs未尝试</text>
  <text x="510" y="248" font-size="8" fill="#9ca3af" text-anchor="middle">适用: FRAMES, WebWalkerQA</text>
  <rect x="600" y="140" width="180" height="40" rx="4" fill="#ec4899"/>
  <text x="690.0" y="163.66666666666666" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">成对比较
