  <line x1="670" y1="116" x2="670" y2="136" stroke="#e8ecf1" stroke-width="1.5"/>
  <rect x="60" y="140" width="180" height="40" rx="4" fill="#10b981"/>
  <text x="150.0" y="163.66666666666666" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">精确匹配
(Exact Match)</text>
  <text x="150" y="196" font-size="9" fill="#6b7280" text-anchor="middle">答案归一化</text>
  <text x="150" y="212" font-size="9" fill="#6b7280" text-anchor="middle">字符串比对</text>
  <text x="150" y="228" font-size="9" fill="#6b7280" text-anchor="middle">客观/可复现</text>
  <text x="150" y="248" font-size="8" fill="#9ca3af" text-anchor="middle">适用: GAIA, BrowseComp-Plus, InfoSeek</text>
  <rect x="240" y="140" width="180" height="40" rx="4" fill="#f59e0b"/>
  <text x="330.0" y="163.66666666666666" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">LLM-as-Judge</text>
  <text x="330" y="196" font-size="9" fill="#6b7280" text-anchor="middle">语义等价判断</text>
  <text x="330" y="212" font-size="9" fill="#6b7280" text-anchor="middle">灵活/可扩展</text>
  <text x="330" y="228" font-size="9" fill="#6b7280" text-anchor="middle">Judge 偏见风险</text>
  <text x="330" y="248" font-size="8" fill="#9ca3af" text-anchor="middle">适用: BrowseComp, DeepSearchQA, HLE</text>
  <rect x="420" y="140" width="180" height="40" rx="4" fill="#06b6d4"/>
  <text x="510.0" y="163.66666666666666" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">三级/多级评分
