<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 850"
     width="1100" height="850"
     font-family="system-ui, -apple-system, sans-serif">
  <rect width="1100" height="850" fill="#ffffff"/>

  <text x="550.0" y="32" font-size="20" fill="#1a1a2e" text-anchor="middle" font-weight="bold">Deep Research 评估方法论全景</text>
  <rect x="100" y="60" width="180" height="36" rx="4" fill="#3b82f6"/>
