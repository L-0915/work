  <rect x="340" y="60" width="180" height="36" rx="4" fill="#8b5cf6"/>
  <text x="430.0" y="82.33333333333333" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">标准答案 (Ground Truth)</text>
  <line x1="430" y1="96" x2="430" y2="116" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="580" y="60" width="180" height="36" rx="4" fill="#ef4444"/>
  <text x="670.0" y="82.33333333333333" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">模型输出 (Prediction)</text>
