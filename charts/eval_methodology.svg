  <rect x="930" y="286" width="140" height="52" rx="4" fill="#fef2f2"/>
  <text x="1000.0" y="315.3333333333333" font-size="10" fill="#ef4444" text-anchor="middle">个性化对齐
(PDR-Bench)</text>
  <rect x="930" y="348" width="140" height="52" rx="4" fill="#fef2f2"/>
  <text x="1000.0" y="377.3333333333333" font-size="10" fill="#ef4444" text-anchor="middle">时间窗口防污染
(LiveBrowseComp)</text>
  <rect x="930" y="410" width="140" height="52" rx="4" fill="#fef2f2"/>
  <text x="1000.0" y="439.3333333333333" font-size="10" fill="#ef4444" text-anchor="middle">跨语言扩展
(K-BrowseComp等)</text>
  <rect x="930" y="472" width="140" height="52" rx="4" fill="#fef2f2"/>
  <text x="1000.0" y="501.3333333333333" font-size="10" fill="#ef4444" text-anchor="middle">领域特化
(PhySciBench)</text>
