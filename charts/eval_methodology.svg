  <rect x="510" y="340" width="100" height="30" rx="4" fill="#f8fafc"/>
  <text x="560.0" y="358.6666666666667" font-size="11" fill="#1a1a2e" text-anchor="middle">分级判断</text>
  <rect x="690" y="340" width="100" height="30" rx="4" fill="#f8fafc"/>
  <text x="740.0" y="358.6666666666667" font-size="11" fill="#1a1a2e" text-anchor="middle">对比判断</text>
  <rect x="870" y="340" width="100" height="30" rx="4" fill="#f8fafc"/>
  <text x="920.0" y="358.6666666666667" font-size="11" fill="#1a1a2e" text-anchor="middle">多维打分</text>
  <rect x="50" y="420" width="150" height="36" rx="4" fill="#10b981"/>
  <text x="125.0" y="441.6666666666667" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">准确率
(Accuracy)</text>
  <text x="125" y="472" font-size="9" fill="#6b7280" text-anchor="middle">ACC</text>
  <text x="125" y="487" font-size="9" fill="#6b7280" text-anchor="middle">EM</text>
  <text x="125" y="502" font-size="9" fill="#6b7280" text-anchor="middle">F1</text>
  <rect x="220" y="420" width="150" height="36" rx="4" fill="#f59e0b"/>
  <text x="295.0" y="441.6666666666667" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">全面性
(Comprehensiveness)</text>
  <text x="295" y="472" font-size="9" fill="#6b7280" text-anchor="middle">Recall@Set</text>
  <text x="295" y="487" font-size="9" fill="#6b7280" text-anchor="middle">Coverage</text>
  <rect x="390" y="420" width="150" height="36" rx="4" fill="#06b6d4"/>
  <text x="465.0" y="441.6666666666667" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">可靠性
(Reliability)</text>
  <text x="465" y="472" font-size="9" fill="#6b7280" text-anchor="middle">NOT_ATTEMPTED%</text>
  <text x="465" y="487" font-size="9" fill="#6b7280" text-anchor="middle">Hallucination%</text>
  <rect x="560" y="420" width="150" height="36" rx="4" fill="#ec4899"/>
  <text x="635.0" y="441.6666666666667" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">引用质量
(Citation Q.)</text>
  <text x="635" y="472" font-size="9" fill="#6b7280" text-anchor="middle">Citation Precision</text>
  <text x="635" y="487" font-size="9" fill="#6b7280" text-anchor="middle">Source Verif.</text>
  <rect x="730" y="420" width="150" height="36" rx="4" fill="#6366f1"/>
  <text x="805.0" y="441.6666666666667" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">综合得分
(Composite)</text>
  <text x="805" y="472" font-size="9" fill="#6b7280" text-anchor="middle">Weighted Score</text>
  <text x="805" y="487" font-size="9" fill="#6b7280" text-anchor="middle">Normalized</text>
  <text x="550.0" y="570" font-size="15" fill="#1a1a2e" text-anchor="middle" font-weight="bold">最终评测报告</text>
  <text x="550.0" y="595" font-size="10" fill="#9ca3af" text-anchor="middle">ACC / F1 / EM / Coverage / Citation / Composite Score / Cost Efficiency</text>
  <rect x="920" y="60" width="160" height="500" rx="6" fill="#f8fafc"/>
  <text x="1000" y="82" font-size="14" fill="#ef4444" text-anchor="middle" font-weight="bold">2026 新趋势</text>
  <rect x="930" y="100" width="140" height="52" rx="4" fill="#fef2f2"/>
  <text x="1000.0" y="129.33333333333334" font-size="10" fill="#ef4444" text-anchor="middle">集合答案评估
(DeepSearchQA)</text>
  <rect x="930" y="162" width="140" height="52" rx="4" fill="#fef2f2"/>
  <text x="1000.0" y="191.33333333333334" font-size="10" fill="#ef4444" text-anchor="middle">层级化 Rubric
(DRB2)</text>
  <rect x="930" y="224" width="140" height="52" rx="4" fill="#fef2f2"/>
  <text x="1000.0" y="253.33333333333334" font-size="10" fill="#ef4444" text-anchor="middle">多模态证据链
