  <line x1="710" y1="200" x2="750" y2="190" stroke="#e8ecf1" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="710" y1="260" x2="750" y2="250" stroke="#e8ecf1" stroke-width="0.8" stroke-dasharray="4,3"/>
  <line x1="710" y1="320" x2="750" y2="310" stroke="#e8ecf1" stroke-width="0.8" stroke-dasharray="4,3"/>
  <rect x="30" y="550" width="1040" height="180" rx="8" fill="#f8fafc"/>
  <text x="50" y="575" font-size="14" fill="#1a1a2e" text-anchor="start" font-weight="bold">生态关系说明</text>
  <text x="50" y="600" font-size="11" fill="#6b7280" text-anchor="start">1. Benchmarks 定义评测标准和问题集, 通过 Tools 实现对 Models 的自动化评估</text>
  <text x="50" y="620" font-size="11" fill="#6b7280" text-anchor="start">2. Tools 提供统一接口: 加载数据集 -&gt; 运行 Agent -&gt; 提取答案 -&gt; 调用 Judge -&gt; 计算指标</text>
  <text x="50" y="640" font-size="11" fill="#6b7280" text-anchor="start">3. OpenResearcher/Web-Bench 致力于统一各 benchmark 格式, 降低评测门槛</text>
  <text x="50" y="660" font-size="11" fill="#6b7280" text-anchor="start">4. LDR Benchmarks 是社区驱动的公开排行榜, 任何人可提交结果 (YAML PR)</text>
  <text x="50" y="680" font-size="11" fill="#6b7280" text-anchor="start">5. 2026 年趋势: 固定语料库 (BrowseComp-Plus) + 时间窗口 (LiveBrowseComp) + 加密数据集防污染</text>
  <text x="50" y="700" font-size="11" fill="#6b7280" text-anchor="start">6. DeepSearchQA 首次引入集合答案评估, 推动从「答对」到「答全」的范式转变</text>
</svg>
